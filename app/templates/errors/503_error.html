{% extends "layout.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-[400px]">
    <div class="max-w-md text-center">
        <h2 class="text-4xl font-bold text-slate-900 mb-4">503</h2>
        <p class="text-slate-600 mb-6">Service Unavailable</p>
        <p class="text-slate-500 mb-8 text-sm">We're experiencing high demand right now. Please try again after some time.</p>
        <a href="{{ url_for('home') }}"
            class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors">←
            Go Back</a>
    </div>
</div>
{% endblock content %}
