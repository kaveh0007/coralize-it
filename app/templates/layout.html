<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}{{ title }}{% else %}Coralize-it{% endif %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>

<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Coralize It Logo" class="h-8 w-8">
                <span class="text-black">Coralize</span><span style="color: #FC7754;">It</span>
            </h1>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-6 py-12 flex-grow w-full">
        {% block content %}{% endblock content %}
    </main>
    <footer class="bg-white border-t border-slate-200 mt-12">
        <div class="max-w-6xl mx-auto px-6 py-6 text-sm text-slate-600">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <p>
                    Developed by <a href="https://linkedin.com/in/kishlaya-verma" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-700 font-medium transition-colors">Kishlaya Verma</a>
                </p>
                <a href="https://github.com/kaveh0007/coralize-it" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-700 font-medium transition-colors">
                    Github Repository
                </a>
            </div>
        </div>
    </footer>
</body>

</html>
